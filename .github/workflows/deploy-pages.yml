name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch:

permissions:
  contents: write

# Latest push wins; cancel any in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check:prototype
      - run: npm run build -- --base "/${{ github.event.repository.name }}/"
      # public/ ships every art iteration (>1 GB, over the Pages site limit);
      # keep only the assets the built app references.
      - run: node scripts/prune-dist.mjs
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-deploy
