name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run check:prototype
      - run: npx vite build

  visual-qa:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      # Hard gate: build + capture the matrix, failing on any captured browser
      # error (runtime exceptions, failed asset loads).
      - run: npm run qa:visual
      # Advisory: compare against committed goldens and write diffs to
      # qa/screenshots/diffs. The goldens are captured on a developer machine,
      # and a pixel gate is only reliable with an identically pinned renderer
      # (font hinting / GPU rasterization differ between environments), so drift
      # here surfaces in the artifacts for review rather than blocking the build.
      # A strict gate would need a containerized renderer; see qa/goldens.
      - run: npm run qa:visual -- --compare --skip-build
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-qa
          path: |
            qa/report.md
            qa/screenshots/
          retention-days: 14
