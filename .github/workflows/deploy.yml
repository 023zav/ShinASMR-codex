name: Deploy to GitHub Pages

# Builds the production bundle and publishes it to the gh-pages branch, which
# GitHub Pages serves at https://023zav.github.io/ShinASMR-codex/. The Vite
# base is /ShinASMR-codex/ so all assets resolve under that subpath.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vite build
      - name: Publish dist to gh-pages
        run: |
          cd dist
          # .nojekyll keeps Pages from filtering Vite's asset filenames.
          touch .nojekyll
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
